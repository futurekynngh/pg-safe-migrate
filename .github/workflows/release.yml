name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:unit

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const packages = JSON.parse('${{ steps.changesets.outputs.publishedPackages }}');
            for (const pkg of packages) {
              const tag = `${pkg.name}@${pkg.version}`;
              const dir = pkg.name === 'pg-safe-migrate' ? 'cli' : 'core';
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `${pkg.name} v${pkg.version}`,
                body: `See [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/packages/${dir}/CHANGELOG.md) for details.`,
                draft: false,
                prerelease: pkg.version.startsWith('0.'),
              });
            }

      - name: Tag Action major version (v1, v2, etc.)
        if: steps.changesets.outputs.published == 'true'
        run: |
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          MAJOR=$(echo "$CLI_VERSION" | cut -d. -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "v${MAJOR}" -m "Update v${MAJOR} tag to ${CLI_VERSION}"
          git push origin "v${MAJOR}" --force
